<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Video Player</title>
    <style>
        body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; font-family: Arial, sans-serif; }
        video { max-width: 90%; max-height: 80vh; background: #000; border: 2px solid #00FFCC; border-radius: 8px; }
        .controls { margin-top: 15px; color: #fff; }
        a { color: #00FFCC; text-decoration: none; }
    </style>
</head>
<body>
    <video controls autoplay loop>
        <source src="YOUR_VIDEO_FILENAME.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="controls">
        <p>📁 <a href="YOUR_VIDEO_FILENAME.mp4" download>Download this video</a></p>
    </div>
</body>
</html>
