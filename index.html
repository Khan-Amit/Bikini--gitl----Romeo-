<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CHASING ROMEO - Web Edition</title>
    <style>
        body { margin: 0; background: black; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 1px solid #00FFCC; }
        #info { position: absolute; bottom: 20px; color: #00FFCC; font-family: monospace; font-size: 14px; text-align: center; width: 100%; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="info">WASD to move • SPACE to shift colors • Refresh to reset</div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        let triX = 400, triY = 300;
        let angle = 0, colorShift = 0;

        // Keyboard input
        const keys = { w: false, a: false, s: false, d: false, space: false };
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') { e.preventDefault(); keys.space = true; }
            else if (e.key === 'w' || e.key === 'W') keys.w = true;
            else if (e.key === 's' || e.key === 'S') keys.s = true;
            else if (e.key === 'a' || e.key === 'A') keys.a = true;
            else if (e.key === 'd' || e.key === 'D') keys.d = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === ' ') { keys.space = false; }
            else if (e.key === 'w' || e.key === 'W') keys.w = false;
            else if (e.key === 's' || e.key === 'S') keys.s = false;
            else if (e.key === 'a' || e.key === 'A') keys.a = false;
            else if (e.key === 'd' || e.key === 'D') keys.d = false;
        });

        function gameLoop() {
            // --- Update ---
            angle += 0.05;
            if (keys.w) triY -= 4;
            if (keys.s) triY += 4;
            if (keys.a) triX -= 4;
            if (keys.d) triX += 4;
            if (keys.space) colorShift += 3;

            // Clamp position
            triX = Math.max(50, Math.min(750, triX));
            triY = Math.max(50, Math.min(550, triY));

            // --- Draw ---
            ctx.clearRect(0, 0, 800, 600);

            // Dynamic color (rainbow)
            const r = 127 + 127 * Math.sin(angle + colorShift * 0.02);
            const g = 127 + 127 * Math.sin(angle + 2 + colorShift * 0.02);
            const b = 127 + 127 * Math.sin(angle + 4 + colorShift * 0.02);
            const color = `rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;

            // Rotating triangle
            const size = 50 + 10 * Math.sin(angle * 0.5);
            const x = triX, y = triY;
            const pts = [
                x, y - size,
                x - size * 0.8, y + size * 0.6,
                x + size * 0.8, y + size * 0.6
            ];

            ctx.beginPath();
            ctx.moveTo(pts[0], pts[1]);
            ctx.lineTo(pts[2], pts[3]);
            ctx.lineTo(pts[4], pts[5]);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // HUD
            ctx.fillStyle = '#00FFCC';
            ctx.font = '14px monospace';
            ctx.fillText(`Position: (${Math.floor(triX)}, ${Math.floor(triY)})`, 20, 30);
            ctx.fillText(`Angle: ${(angle * 180 / Math.PI).toFixed(0)}°`, 20, 50);

            requestAnimationFrame(gameLoop);
        }

        // Start the loop
        gameLoop();
    </script>
</body>
</html>
